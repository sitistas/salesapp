{% extends 'base.html' %}

{% block content %}
<div class="mb-8 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-800">Κατάλογος Προϊόντων</h1>
    
    <div class="flex gap-2">
        <button onclick="toggleModal('categoryModal')" class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-200 transition">
            Διαχείριση Κατηγοριών
        </button>
        <a href="#" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition">
            + Νέο Προϊόν
        </a>
    </div>
</div>

<div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
    <table class="w-full text-sm text-left">
        <thead class="bg-gray-50 text-gray-400 uppercase text-[10px] font-bold tracking-widest">
            <tr>
                <th class="px-6 py-4">Κωδικός (SKU)</th>
                <th class="px-6 py-4">Όνομα</th>
                <th class="px-6 py-4">Κατηγορία</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            {% for p in products %}
            <tr class="hover:bg-gray-50 transition">
                <td class="px-6 py-4 font-mono text-blue-600 font-bold">{{ p.sku }}</td>
                <td class="px-6 py-4 font-medium text-gray-900">{{ p.name }}</td>
                <td class="px-6 py-4">
                    <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-semibold uppercase">
                        {{ p.category.name }}
                    </span>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div id="categoryModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-gray-800">Κατηγορίες</h3>
            <button onclick="toggleModal('categoryModal')" class="text-gray-400 hover:text-gray-600">&times;</button>
        </div>

        <div class="max-h-40 overflow-y-auto mb-6 space-y-2">
            {% for cat in categories %}
            <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg">
                <span class="text-sm text-gray-700">{{ cat.name }}</span>
                </div>
            {% endfor %}
        </div>

        <form action="{% url 'add-category' %}" method="post" class="border-t pt-4">
            {% csrf_token %}
            <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Νέα Κατηγορία</label>
            <div class="flex gap-2">
                <input type="text" name="name" required class="flex-1 rounded-lg border-gray-200 text-sm focus:ring-blue-500" placeholder="Όνομα κατηγορίας...">
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Προσθήκη</button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleModal(id) {
        const modal = document.getElementById(id);
        if (modal.classList.contains('hidden')) {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        } else {
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }
    }
</script>
{% endblock %}
