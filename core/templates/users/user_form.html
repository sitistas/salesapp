{% extends 'base.html' %}
{% load tailwind_filters %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6 text-left">
        <a href="{% url 'user-list' %}" class="text-sm text-gray-500 hover:text-indigo-600 inline-flex items-center transition">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Επιστροφή στη λίστα
        </a>
    </div>

    <div class="bg-white rounded-2xl border border-gray-100 shadow-xl overflow-hidden">
        <div class="bg-indigo-600 p-6">
            <h2 class="text-xl font-bold text-white flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                {% if object %}Επεξεργασία Χρήστη: {{ object.username }}{% else %}Δημιουργία Χρήστη{% endif %}
            </h2>
        </div>

        <form method="post" class="p-8 space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                {{ form|crispy }}
            </div>

            <div class="pt-6 border-t border-gray-100 flex flex-col sm:flex-row gap-3">
                <button type="submit" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">
                    Αποθήκευση Αλλαγών
                </button>
                <a href="{% url 'user-list' %}" class="flex-1 bg-gray-50 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-100 transition text-center border border-gray-200">
                    Ακύρωση
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
