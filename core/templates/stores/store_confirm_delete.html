{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white p-8 rounded-2xl border border-red-100 shadow-2xl text-center">
        <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        
        <h2 class="text-xl font-bold text-gray-800 mb-2">Διαγραφή Καταστήματος;</h2>
        <p class="text-gray-500 text-sm mb-6">
            Είστε σίγουροι ότι θέλετε να διαγράψετε το κατάστημα <span class="font-bold text-gray-800">"{{ object.name }}"</span>; Αυτή η ενέργεια δεν αναιρείται.
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="flex flex-col gap-2">
                <button type="submit" class="bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700 transition">
                    Ναι, Διαγραφή
                </button>
                <a href="{% url 'store-list' %}" class="bg-gray-100 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-200 transition text-center">
                    Ακύρωση
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
