{% extends 'base.html' %}
{% load tailwind_filters %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="{% url 'store-list' %}" class="text-sm text-gray-500 hover:text-blue-600 flex items-center transition">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Επιστροφή στη λίστα
        </a>
    </div>

    <div class="bg-white rounded-2xl border border-gray-100 shadow-xl overflow-hidden">
        <div class="bg-blue-600 p-6">
            <h2 class="text-xl font-bold text-white">
                {% if object %}Επεξεργασία Καταστήματος{% else %}Προσθήκη Νέου Καταστήματος{% endif %}
            </h2>
        </div>

        <form method="post" class="p-8 space-y-6">
            {% csrf_token %}
            <div class="space-y-4">
                {{ form|crispy }}
            </div>

            <div class="pt-4 flex flex-col sm:flex-row gap-3">
                <button type="submit" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                    Αποθήκευση
                </button>
                <a href="{% url 'store-list' %}" class="flex-1 bg-gray-50 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-100 transition text-center border border-gray-200">
                    Ακύρωση
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
